{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Módulo de Triangulación</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .contenedor { display: flex; gap: 40px; }
        form { width: 300px; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; }
        button { padding: 10px; width: 100%; background: #007bff; color: white; border: none; cursor: pointer; }
        canvas { border: 2px solid #333; background: #fff; }
    </style>
</head>
<body>
    <h2>Módulo de Triangulación de Ubicación</h2>
    <hr>

    <div class="contenedor">
        <form method="post">
            {% csrf_token %}
            <h3>Ingresar Distancias:</h3>
            <label>Distancia al Punto A (0, 0):</label>
            <input type="number" step="0.01" name="distancia_a" required>
            
            <label>Distancia al Punto B (100, 0):</label>
            <input type="number" step="0.01" name="distancia_b" required>
            
            <label>Distancia al Punto C (50, 86.6):</label>
            <input type="number" step="0.01" name="distancia_c" required>
            
            <button type="submit">Calcular Ubicación aproximada</button>
        </form>

        <div id="datos-mapa" 
             data-ax="{{ punto_a.x }}" data-ay="{{ punto_a.y }}"
             data-bx="{{ punto_b.x }}" data-by="{{ punto_b.y }}"
             data-cx="{{ punto_c.x }}" data-cy="{{ punto_c.y }}"
             {% if resultado %}
             data-rx="{{ resultado.x }}" data-ry="{{ resultado.y }}"
             {% endif %}>
            
            {% if resultado %}
                <h3 style="color: red;"> Ubicación Detectada -> X: {{ resultado.x }}, Y: {{ resultado.y }}</h3>
            {% else %}
                <h3>Esperando datos para triangular...</h3>
            {% endif %}
            <canvas id="mapa" width="400" height="400"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mapa');
        const ctx = canvas.getContext('2d');
        const escala = 3; 

        // Capturamos el elemento contenedor que tiene guardados los datos de Django
        const contenedorDatos = document.getElementById('datos-mapa');

        // Leemos los datos numéricos de forma nativa desde el HTML
        const puntoA = { x: Number(contenedorDatos.dataset.ax), y: Number(contenedorDatos.dataset.ay) };
        const puntoB = { x: Number(contenedorDatos.dataset.bx), y: Number(contenedorDatos.dataset.by) };
        const puntoC = { x: Number(contenedorDatos.dataset.cx), y: Number(contenedorDatos.dataset.cy) };

        function dibujarPunto(x, y, color, nombre) {
            let canvasX = x * escala + 50;
            let canvasY = 350 - (y * escala);

            ctx.beginPath();
            ctx.arc(canvasX, canvasY, 6, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.font = "12px Arial";
            ctx.fillStyle = "#333";
            ctx.fillText(nombre, canvasX + 10, canvasY + 5);
        }

        // Dibujar los 3 Puntos de Referencia Fijos
        dibujarPunto(puntoA.x, puntoA.y, 'blue', 'Punto A (0,0)');
        dibujarPunto(puntoB.x, puntoB.y, 'blue', 'Punto B (100,0)');
        dibujarPunto(puntoC.x, puntoC.y, 'blue', 'Punto C (50,86.6)');

        // Si existen las coordenadas del resultado en los atributos del HTML, dibujamos el punto rojo
        if (contenedorDatos.dataset.rx && contenedorDatos.dataset.ry) {
            const resX = Number(contenedorDatos.dataset.rx);
            const resY = Number(contenedorDatos.dataset.ry);
            dibujarPunto(resX, resY, 'red', 'OBJETO DETECTADO');
        }
    </script>
</body>
</html>
